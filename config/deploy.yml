# Nombre de tu aplicación
service: consilium

# Tu imagen en Docker Hub
image: luisomarrojasmercado/consilium

builder:
  arch: amd64

# --- AQUÍ ESTÁ EL CAMBIO ---
# Agregamos la sección proxy explícita para configurar el tiempo, 
# pero forzamos SSL falso y usamos la IP como host.
proxy:
  ssl: false
  host: 74.208.227.22
  healthcheck:
    path: /up
    interval: 20  # Revisa cada 20 segundos (da más tiempo para migraciones)
    timeout: 5

# Servidores donde se desplegará
servers:
  # 1. El Servidor Web
  web:
    hosts:
      - 74.208.227.22
    env:
      clear:
        SOLID_QUEUE_IN_PUMA: "false"

  # 2. El Servidor de Tareas
  job:
    hosts:
      - 74.208.227.22
    # Mantengo 'bundle exec' ya que confirmaste que este archivo funcionaba bien antes
    cmd: bundle exec rails solid_queue:start
    env:
      clear:
        SOLID_QUEUE_IN_PUMA: "false"
        SOLID_QUEUE_QUEUES: "*"
  
  # 3. El Scheduler (El reloj que lee recurring.yml)
  scheduler:
    hosts:
      - 74.208.227.22
    cmd: bundle exec rails solid_queue:scheduler:start
    env:
      clear:
        SOLID_QUEUE_IN_PUMA: "false"

# Credenciales
registry:
  username: luisomarrojasmercado
  password: <%= ENV["KAMAL_REGISTRY_PASSWORD"] %>

# Variables de entorno
env:
  secret:
    - RAILS_MASTER_KEY
    - MYSQL_ROOT_PASSWORD
    - SECRET_KEY_BASE
    - MYSQL_ROOT_PASSWORD
    - SMTP_ADDRESS
    - SMTP_PORT
    - SMTP_USERNAME
    - SMTP_PASSWORD
    - SMTP_DOMAIN
    - MAILER_SENDER
  clear:
    RAILS_SERVE_STATIC_FILES: true
    DB_HOST: 74.208.227.22
    SECRET_KEY_BASE: eb6b0d8459c79fd2e1f47dee27e70d22ff49989dc27d28fad0bf7876fe283d87481066101cf8406f85ebebc4c44083a3f5a9ecb50afaa1cb5761aa1e739accbc
    REDIS_URL: "redis://74.208.227.22:6379/1"
    RAILS_SERVE_STATIC_FILES: true
    RAILS_LOG_TO_STDOUT: true
    SOLID_QUEUE_IN_PUMA: "false"

# Accesorios
accessories:
  db:
    image: mysql:8.0
    host: 74.208.227.22
    port: 3306
    env:
      clear:
        MYSQL_ROOT_PASSWORD: '<%= ENV["MYSQL_ROOT_PASSWORD"] %>'
        MYSQL_DATABASE: consilium_production
      secret:
        - MYSQL_ROOT_PASSWORD
    files:
      - config/mysql/production.cnf:/etc/mysql/conf.d/production.cnf
    directories:
      - data:/var/lib/mysql

  redis:
    image: redis:7.0
    host: 74.208.227.22
    port: 6379
    directories:
      - data:/data

volumes:
  - "/var/lib/consilium/storage:/rails/storage"